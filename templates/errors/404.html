<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LibraryOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Inter',sans-serif; background:#f9fafb; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .error-wrap { text-align:center; padding:40px 20px; }
        .error-code { font-size:120px; font-weight:800; color:#e5e7eb; line-height:1; margin-bottom:8px; }
        .error-icon { font-size:48px; color:#4f46e5; margin-bottom:20px; }
        .error-title { font-size:24px; font-weight:700; color:#111827; margin-bottom:8px; }
        .error-msg { font-size:15px; color:#6b7280; margin-bottom:28px; }
        .btn-home { display:inline-flex; align-items:center; gap:8px; background:#4f46e5; color:white; padding:11px 24px; border-radius:8px; font-size:14px; font-weight:600; text-decoration:none; transition:all .2s; }
        .btn-home:hover { background:#3730a3; color:white; }
        .btn-back { display:inline-flex; align-items:center; gap:8px; background:#f3f4f6; color:#374151; padding:11px 20px; border-radius:8px; font-size:14px; font-weight:500; text-decoration:none; margin-left:10px; transition:all .2s; }
        .btn-back:hover { background:#e5e7eb; }
    </style>
</head>
<body>
<div class="error-wrap">
    <div class="error-code">404</div>
    <div class="error-icon"><i class="fa-solid fa-map-location-dot"></i></div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-msg">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/dashboard/" class="btn-home"><i class="fa-solid fa-house"></i> Go to Dashboard</a>
    <a href="javascript:history.back()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
</div>
</body>
</html>
