<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="{% url 'dashboard:index' %}" class="sidebar-logo">
            <i class="fa-solid fa-book-open-reader"></i>
            <span class="logo-text">LibraryOS</span>
        </a>
        <button class="sidebar-toggle-btn d-lg-none" id="sidebarClose" style="display:flex!important;">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">
            <span class="nav-label">Main</span>
            <a href="{% url 'dashboard:index' %}" class="nav-item {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}">
                <i class="fa-solid fa-gauge-high"></i>
                <span>Dashboard</span>
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-label">Library</span>
            <a href="{% url 'books:list' %}" class="nav-item {% if request.resolver_match.app_name == 'books' %}active{% endif %}">
                <i class="fa-solid fa-books"></i>
                <span>Books</span>
            </a>
            <a href="{% url 'members:list' %}" class="nav-item {% if request.resolver_match.app_name == 'members' %}active{% endif %}">
                <i class="fa-solid fa-users"></i>
                <span>Members</span>
            </a>
            <a href="{% url 'borrowing:list' %}" class="nav-item {% if request.resolver_match.app_name == 'borrowing' %}active{% endif %}">
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <span>Borrowing</span>
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-label">Insights</span>
            <a href="{% url 'reports:index' %}" class="nav-item {% if request.resolver_match.app_name == 'reports' %}active{% endif %}">
                <i class="fa-solid fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="{% url 'notifications:list' %}" class="nav-item {% if request.resolver_match.app_name == 'notifications' %}active{% endif %}">
                <i class="fa-solid fa-bell"></i>
                <span>Notifications</span>
            </a>
        </div>

        {% if user.is_staff %}
        <div class="nav-section">
            <span class="nav-label">System</span>
            <a href="/admin/" class="nav-item">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <span>Admin Panel</span>
            </a>
        </div>
        {% endif %}
    </nav>

    <div class="sidebar-footer">
        <a href="{% url 'accounts:profile' %}" class="user-info" style="text-decoration:none;">
            <div class="user-avatar">
                {% if user.avatar %}
                    <img src="{{ user.avatar.url }}" alt="{{ user.full_name }}">
                {% else %}
                    {{ user.first_name|first }}{{ user.last_name|first }}
                {% endif %}
            </div>
            <div class="user-details">
                <p class="user-name">{{ user.get_full_name }}</p>
                <p class="user-role">{{ user.get_role_display }}</p>
            </div>
        </a>
    </div>
</aside>
