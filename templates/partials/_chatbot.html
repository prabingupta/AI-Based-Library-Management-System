<!-- Chatbot Toggle Button -->
<button class="chatbot-toggle" id="chatbotToggle" title="Library Assistant">
    <i class="fa-solid fa-robot" id="chatbotIcon"></i>
</button>

<!-- Chatbot Widget -->
<div class="chatbot-widget" id="chatbotWidget">
    <div class="chatbot-header">
        <div class="d-flex align-items-center gap-2">
            <div class="chatbot-avatar">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div>
                <p class="chatbot-name">LibraryOS Assistant</p>
                <p class="chatbot-status"><span class="status-dot"></span>AI Powered</p>
            </div>
        </div>
        <button class="chatbot-close" id="chatbotClose">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div class="chatbot-messages" id="chatbotMessages">
        <div class="chat-msg bot">
            <div class="chat-bubble">
                👋 Hi! I'm your library assistant. I can help you find books, check availability, or answer questions about borrowing. What would you like to know?
            </div>
        </div>
    </div>

    <div class="chatbot-suggestions" id="chatSuggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('What books are available?')">What books are available?</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Do you have any science books?')">Science books?</button>
        <button class="suggestion-btn" onclick="sendSuggestion('How do I borrow a book?')">How to borrow?</button>
    </div>

    <div class="chatbot-input-wrap">
        <input
            type="text"
            id="chatbotInput"
            class="chatbot-input"
            placeholder="Ask me anything..."
            maxlength="500"
            autocomplete="off"
        >
        <button class="chatbot-send" id="chatbotSend">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<style>
.chatbot-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(79,70,229,.4);
    transition: all .2s;
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
}
.chatbot-toggle:hover { transform: scale(1.08); background: var(--primary-dark); }

.chatbot-widget {
    position: fixed;
    bottom: 96px;
    right: 28px;
    width: 360px;
    max-height: 520px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.15);
    display: flex;
    flex-direction: column;
    z-index: 9997;
    overflow: hidden;
    transform: translateY(20px) scale(.95);
    opacity: 0;
    pointer-events: none;
    transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.chatbot-widget.open {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: all;
}

.chatbot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--primary);
    color: white;
}
.chatbot-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
}
.chatbot-name { font-size: 13.5px; font-weight: 700; margin: 0; color: white; }
.chatbot-status { font-size: 11px; margin: 0; color: rgba(255,255,255,.8); display: flex; align-items: center; gap: 5px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }
.chatbot-close { background: transparent; border: none; color: white; font-size: 16px; cursor: pointer; padding: 4px; border-radius: 6px; opacity: .8; }
.chatbot-close:hover { opacity: 1; background: rgba(255,255,255,.1); }

.chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
}
.chat-msg { display: flex; }
.chat-msg.bot { justify-content: flex-start; }
.chat-msg.user { justify-content: flex-end; }

.chat-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.5;
}
.chat-msg.bot .chat-bubble {
    background: var(--border-light);
    color: var(--text-primary);
    border-radius: 4px 12px 12px 12px;
}
.chat-msg.user .chat-bubble {
    background: var(--primary);
    color: white;
    border-radius: 12px 4px 12px 12px;
}

.typing-bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typing { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.chatbot-suggestions {
    padding: 0 12px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.suggestion-btn {
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
}
.suggestion-btn:hover { background: var(--primary); color: white; }

.chatbot-input-wrap {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
}
.chatbot-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 13.5px;
    background: var(--bg-page);
    color: var(--text-primary);
    outline: none;
    transition: border .2s;
}
.chatbot-input:focus { border-color: var(--primary); }
.chatbot-send {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
}
.chatbot-send:hover { background: var(--primary-dark); }

@media (max-width: 480px) {
    .chatbot-widget { width: calc(100vw - 32px); right: 16px; }
    .chatbot-toggle { right: 16px; bottom: 16px; }
}
</style>

<script>
(function () {
    const toggle = document.getElementById('chatbotToggle');
    const widget = document.getElementById('chatbotWidget');
    const closeBtn = document.getElementById('chatbotClose');
    const input = document.getElementById('chatbotInput');
    const sendBtn = document.getElementById('chatbotSend');
    const messages = document.getElementById('chatbotMessages');
    const suggestions = document.getElementById('chatSuggestions');
    const icon = document.getElementById('chatbotIcon');

    let history = [];
    let isOpen = false;

    toggle.addEventListener('click', function () {
        isOpen = !isOpen;
        widget.classList.toggle('open', isOpen);
        icon.className = isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-robot';
        if (isOpen) input.focus();
    });

    closeBtn.addEventListener('click', function () {
        isOpen = false;
        widget.classList.remove('open');
        icon.className = 'fa-solid fa-robot';
    });

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendSuggestion(text) {
        input.value = text;
        sendMessage();
    }
    window.sendSuggestion = sendSuggestion;

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';
        suggestions.style.display = 'none';

        const typingId = showTyping();
        sendBtn.disabled = true;

        fetch('/api/chatbot/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ message: text, history: history }),
        })
        .then(r => r.json())
        .then(data => {
            removeTyping(typingId);
            sendBtn.disabled = false;
            const reply = data.response || data.error || 'Sorry, something went wrong.';
            appendMessage('bot', reply);
            history.push({ role: 'user', content: text });
            history.push({ role: 'assistant', content: reply });
            if (history.length > 12) history = history.slice(-12);
        })
        .catch(() => {
            removeTyping(typingId);
            sendBtn.disabled = false;
            appendMessage('bot', 'Connection error. Please try again.');
        });
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-msg ${role}`;
        div.innerHTML = `<div class="chat-bubble">${escapeHtml(text)}</div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        const id = 'typing-' + Date.now();
        const div = document.createElement('div');
        div.className = 'chat-msg bot';
        div.id = id;
        div.innerHTML = `<div class="chat-bubble typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\n/g, '<br>');
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }
})();
</script>
