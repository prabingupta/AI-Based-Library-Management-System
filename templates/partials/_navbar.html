<header class="top-navbar">
    <div class="navbar-left">
        <button class="sidebar-toggle-btn" id="sidebarToggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="page-heading">{% block page_title %}{{ page_title|default:"Dashboard" }}{% endblock %}</h1>
    </div>

    <div class="navbar-right">
        <!-- Search -->
        <form method="get" action="{% url 'books:search' %}" class="d-none d-md-flex" style="position:relative;">
            <div style="position:relative;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;pointer-events:none;"></i>
                <input
                    type="text"
                    name="q"
                    placeholder="Search..."
                    class="form-control"
                    style="padding-left:30px;font-size:13px;height:34px;width:200px;border-radius:8px;border:1px solid var(--border);background:var(--border-light);color:var(--text-primary);"
                >
            </div>
        </form>

        <a href="{% url 'books:search' %}" class="icon-btn d-md-none" title="Search">
            <i class="fa-solid fa-magnifying-glass"></i>
        </a>

        <!-- Dark Mode -->
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>

        <!-- Notifications -->
        <div class="dropdown">
            <button class="icon-btn position-relative" data-bs-toggle="dropdown" title="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="notif-dot"></span>
            </button>
            <div class="dropdown-menu dropdown-menu-end notif-dropdown p-0">
                <div class="notif-header">
                    <span style="font-weight:600;font-size:13.5px;">Notifications</span>
                    <a href="{% url 'notifications:list' %}" style="color:var(--primary);font-size:12.5px;text-decoration:none;font-weight:500;">View all</a>
                </div>
                <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">
                    No new notifications
                </div>
            </div>
        </div>

        <!-- User Menu -->
        <div class="dropdown">
            <button class="user-menu-btn" data-bs-toggle="dropdown">
                <div class="nav-avatar">
                    {% if user.avatar %}
                        <img src="{{ user.avatar.url }}" alt="">
                    {% else %}
                        {{ user.first_name|first }}{{ user.last_name|first }}
                    {% endif %}
                </div>
                <span class="d-none d-md-inline" style="color:var(--text-primary);">{{ user.first_name }}</span>
                <i class="fa-solid fa-chevron-down" style="font-size:10px;color:var(--text-muted);"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" style="min-width:180px;">
                <li>
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                        <i class="fa-solid fa-user me-2" style="color:var(--text-muted);width:16px;"></i>Profile
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="{% url 'books:categories' %}">
                        <i class="fa-solid fa-folder me-2" style="color:var(--text-muted);width:16px;"></i>Categories
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form method="post" action="{% url 'accounts:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="dropdown-item" style="color:var(--danger);width:100%;text-align:left;">
                            <i class="fa-solid fa-right-from-bracket me-2" style="width:16px;"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>
